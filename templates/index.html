<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Image Enhancer</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #0f172a;
            overflow-x: hidden;
        }

        .glow {
            background: radial-gradient(circle at center,
                    rgba(59, 130, 246, 0.2),
                    transparent 70%);
        }

        .glass {
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #60a5fa;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="text-white min-h-screen">

    <!-- Background -->
    <div class="fixed inset-0 glow"></div>

    <!-- Navbar -->
    <nav class="border-b border-white/10 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

            <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                AI Image Enhancer
            </h1>

            <span class="text-sm text-gray-400">
                Flask + Pillow
            </span>

        </div>
    </nav>

    <!-- Hero -->
    <section class="max-w-5xl mx-auto px-6 pt-16 text-center">

        <h2 class="text-5xl font-bold mb-4">
            Enhance Images With AI
        </h2>

        <p class="text-gray-400 max-w-2xl mx-auto">
            Upload an image, improve its quality, sharpen details,
            and compare the result instantly.
        </p>

    </section>

    <!-- Upload Section -->
    <section class="max-w-4xl mx-auto px-6 mt-12">

        <div class="glass rounded-3xl p-8">

            <form method="POST" enctype="multipart/form-data" id="uploadForm">

                <label
                    class="border-2 border-dashed border-blue-500/40 rounded-2xl p-10 flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 transition">

                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="w-16 h-16 text-blue-400 mb-4"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor">

                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M7 16a4 4 0 01-.88-7.903A5 5 0
                            1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0
                            0l-3 3m3-3v12" />

                    </svg>

                    <p class="text-lg font-semibold">
                        Drag & Drop Image
                    </p>

                    <p class="text-gray-400 text-sm mt-2">
                        JPG, PNG supported
                    </p>

                    <input
                        type="file"
                        name="image"
                        id="imageInput"
                        class="hidden"
                        accept="image/*"
                        required>

                </label>

                <!-- Preview -->
                <div id="previewContainer"
                    class="hidden mt-6">

                    <img id="preview"
                        class="rounded-xl mx-auto max-h-96 shadow-lg">

                </div>

                <button
                    id="enhanceBtn"
                    type="submit"
                    class="mt-8 w-full bg-gradient-to-r from-blue-500 to-purple-600 py-4 rounded-xl font-bold text-lg hover:scale-[1.02] transition">

                    Enhance Image

                </button>

            </form>

        </div>

    </section>

    <!-- Loading -->
    <div id="loading"
        class="hidden flex flex-col items-center mt-10">

        <div class="loader"></div>

        <p class="mt-4 text-gray-400">
            Enhancing Image...
        </p>

    </div>

    {% if enhanced_image %}

    <!-- Result -->
    <section class="max-w-6xl mx-auto px-6 py-16">

        <h3 class="text-3xl font-bold text-center mb-10">
            Enhancement Result
        </h3>

        <div class="grid md:grid-cols-2 gap-8">

            <!-- Original -->
            <div class="glass p-4 rounded-2xl">

                <h4 class="mb-4 text-center text-blue-400 font-bold">
                    Original Image
                </h4>

                <img
                    src="{{ url_for('uploaded_file', filename=original_image) }}"
                    class="rounded-xl w-full">

            </div>

            <!-- Enhanced -->
            <div class="glass p-4 rounded-2xl">

                <h4 class="mb-4 text-center text-green-400 font-bold">
                    Enhanced Image
                </h4>

                <img
                    src="{{ url_for('enhanced_file', filename=enhanced_image) }}"
                    class="rounded-xl w-full">

            </div>

        </div>

        <!-- Download -->
        <div class="text-center mt-10">

            <a
                href="{{ url_for('enhanced_file', filename=enhanced_image) }}"
                download
                class="inline-block bg-green-600 px-8 py-4 rounded-xl font-bold hover:bg-green-700 transition">

                Download Enhanced Image

            </a>

        </div>

    </section>

    {% endif %}

    <script>

        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const previewContainer = document.getElementById('previewContainer');
        const form = document.getElementById('uploadForm');
        const loading = document.getElementById('loading');

        imageInput.addEventListener('change', function () {

            const file = this.files[0];

            if (!file) return;

            preview.src = URL.createObjectURL(file);

            previewContainer.classList.remove('hidden');

        });

        form.addEventListener('submit', () => {

            loading.classList.remove('hidden');

        });

    </script>

</body>

</html>
```
